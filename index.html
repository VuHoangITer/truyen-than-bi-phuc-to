<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Khủng Bố Sống Lại — Phật Tiền Hiến Hoa</title>
<style>
:root{
  --bg:#111015; --panel:#1a1920; --text:#c9c5bd; --muted:#7b7770;
  --accent:#c0392b; --border:#2a2830; --heading:#e8e4dc;
  --sidebar-w:300px;
}
[data-theme="light"]{--bg:#fafaf7;--panel:#ffffff;--text:#2b2b2b;--muted:#8a8a85;--accent:#b03024;--border:#e4e2dc;--heading:#171717;}
[data-theme="sepia"]{--bg:#f3ead8;--panel:#faf4e5;--text:#4b3f2f;--muted:#98876c;--accent:#a04020;--border:#e0d3b8;--heading:#33291b;}
[data-theme="dark"]{--bg:#111015;--panel:#1a1920;--text:#c9c5bd;--muted:#7b7770;--accent:#c0392b;--border:#2a2830;--heading:#e8e4dc;}
[data-theme="black"]{--bg:#000000;--panel:#0d0d0d;--text:#b5b1a9;--muted:#666;--accent:#992f22;--border:#1c1c1c;--heading:#d8d4cc;}

*{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{
  background:var(--bg); color:var(--text);
  font-family:Georgia,'Times New Roman',serif;
  transition:background .25s,color .25s;
  overscroll-behavior-y:none;
}
body[data-font="sans"]{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;}

/* ===== Top bar ===== */
#topbar{
  position:fixed; top:0; left:0; right:0; z-index:50;
  display:flex; align-items:center; gap:8px;
  padding:10px 14px; padding-top:calc(10px + env(safe-area-inset-top));
  background:color-mix(in srgb, var(--bg) 88%, transparent);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
  transition:transform .25s;
}
#topbar.hidden{transform:translateY(-110%);}
#topbar .title{
  flex:1; min-width:0; font-size:13px; color:var(--muted);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  font-family:-apple-system,Segoe UI,Roboto,sans-serif;
}
.iconbtn{
  background:none; border:1px solid var(--border); color:var(--text);
  border-radius:8px; width:36px; height:36px; font-size:16px;
  cursor:pointer; flex:none; display:flex;align-items:center;justify-content:center;
}
.iconbtn:active{background:var(--panel);}

/* ===== Sidebar (TOC) ===== */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:60;opacity:0;pointer-events:none;transition:opacity .25s;}
#overlay.show{opacity:1;pointer-events:auto;}
#sidebar{
  position:fixed; top:0; left:0; bottom:0; width:var(--sidebar-w); max-width:85vw;
  background:var(--panel); border-right:1px solid var(--border); z-index:70;
  transform:translateX(-102%); transition:transform .25s;
  display:flex; flex-direction:column;
  padding-top:env(safe-area-inset-top);
}
#sidebar.show{transform:translateX(0);}
#sidebar header{padding:14px 14px 8px;}
#sidebar h1{font-size:15px;color:var(--heading);line-height:1.3;}
#sidebar .author{font-size:12px;color:var(--muted);margin-top:2px;font-family:sans-serif;}
#chapsearch{
  margin:10px 14px; padding:8px 10px; width:calc(100% - 28px);
  background:var(--bg); border:1px solid var(--border); border-radius:8px;
  color:var(--text); font-size:14px; outline:none;
}
#toclist{flex:1;overflow-y:auto;overscroll-behavior:contain;padding:4px 0 20px;}
.tocitem{
  display:block; width:100%; text-align:left; background:none; border:none;
  padding:9px 14px; color:var(--text); font-size:13.5px; cursor:pointer;
  font-family:-apple-system,Segoe UI,Roboto,sans-serif; line-height:1.35;
  border-left:3px solid transparent;
}
.tocitem:active{background:var(--bg);}
.tocitem.current{border-left-color:var(--accent); color:var(--accent); background:color-mix(in srgb, var(--accent) 8%, transparent);}
.tocitem .num{color:var(--muted);font-size:11px;display:block;}
.tocitem.current .num{color:var(--accent);}

/* ===== Settings panel ===== */
#settings{
  position:fixed; right:10px; top:calc(56px + env(safe-area-inset-top)); z-index:80;
  background:var(--panel); border:1px solid var(--border); border-radius:14px;
  padding:16px; width:280px; max-width:calc(100vw - 20px);
  box-shadow:0 10px 40px rgba(0,0,0,.35);
  display:none;
}
#settings.show{display:block;}
#settings .row{margin-bottom:14px;}
#settings label{display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;font-family:sans-serif;}
.seg{display:flex;gap:6px;}
.seg button{
  flex:1; padding:7px 4px; border:1px solid var(--border); background:var(--bg);
  color:var(--text); border-radius:8px; font-size:13px; cursor:pointer; font-family:sans-serif;
}
.seg button.on{border-color:var(--accent); color:var(--accent);}
.swatches{display:flex;gap:8px;}
.swatch{width:40px;height:40px;border-radius:10px;border:2px solid var(--border);cursor:pointer;}
.swatch.on{border-color:var(--accent);}
.sw-light{background:#fafaf7;} .sw-sepia{background:#f3ead8;} .sw-dark{background:#1a1920;} .sw-black{background:#000;}
.stepper{display:flex;align-items:center;gap:10px;}
.stepper button{width:38px;height:34px;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:8px;font-size:17px;cursor:pointer;}
.stepper span{flex:1;text-align:center;font-size:13px;font-family:sans-serif;color:var(--muted);}

/* ===== Reading area ===== */
#reader{
  max-width:var(--maxw,700px); margin:0 auto;
  padding:calc(70px + env(safe-area-inset-top)) 20px 40px;
}
#chapheader{margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(--border);}
#chapheader .kicker{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-family:sans-serif;margin-bottom:6px;}
#chapheader h2{font-size:1.45em;color:var(--heading);line-height:1.3;font-weight:600;}
#content p{
  font-size:var(--fs,19px); line-height:var(--lh,1.85);
  margin-bottom:1em; text-align:justify;
  word-break:break-word;
}
#content p:first-of-type::first-letter{
  font-size:2.6em; float:left; line-height:.85; padding-right:8px; color:var(--accent);
  font-weight:600;
}

/* ===== Nav footer ===== */
#chapnav{
  max-width:var(--maxw,700px); margin:0 auto; padding:0 20px calc(30px + env(safe-area-inset-bottom));
  display:flex; gap:10px;
}
#chapnav button{
  flex:1; padding:13px; border:1px solid var(--border); background:var(--panel);
  color:var(--text); border-radius:12px; font-size:14px; cursor:pointer; font-family:sans-serif;
}
#chapnav button:disabled{opacity:.35;cursor:default;}
#progress{
  position:fixed; bottom:0; left:0; height:3px; background:var(--accent); z-index:40; width:0%;
}
</style>
</head>

. Ngay cả áo liệm cũng không thể nào áp chế được thứ kia, nó vẫn có thể hành động được. Cũng tương tự như mắt quỷ và bóng quỷ không đầu của Dương Gian vậy.mặc dù nhìn qua thì thấy chúng đã thiết lập được cân bằng. Nhưng thật ra lại có môt bên mạnh, một bên yếu, trước mắt xem ra mắt quỷ cũng không thể nào áp chế được bóng quỷ không đầu, Diệp Phong cũng tương tự như vậy. Chiếc áo liệm trên người của hắn ta vẫn còn kém so với thứ gì đó ở bên dưới. Máu tươi nhỏ xuống, để chứng minh cho việc con lệ quỷ thứ hai ở trong người của Diệp Phong đã bắt đầu rục rịch. Tròng mắt Dương Gian hơi híp, mặc dù hắn đang lùi lại ở bên trong quỷ vực nhưng cũng không còn dài nữa, không lâu nữa là hắn sẽ không có đường lùi. - Vì ổn thỏa lại mọi thứ, không thể nào để cho tên này ra tay trước được, nhất định phải ra tay trước. Cứ kiêng kỵ con quỷ thứ hai của hắn ta còn không bằng ra tay trước để chiếm tiên cơ."],[301,"Ai Trả Giá Nhiều Hơn? 1"],[302,"Ai Trả Giá Nhiều Hơn? 2"],[303,"Bé Gái"],[304,"Chơi Đùa Cùng Diệp Phong"],[305,"Răng Quỷ"],[306,"Không Phân Cao Thấp"],[307,"Chân Thân Của Quỷ Dây Thừng"],[308,"Báo Thù"],[309,"Tôn Nghĩa 1"],[310,"Tôn Nghĩa 2"],[311,"Cảnh Sát Tới"],[312,"Tấm Da Trợ Giúp"],[313,"Cách Khống Chế Lệ Quỷ 1"],[314,"Cách Khống Chế Lệ Quỷ 2"],[315,"Tiến Hành Khảo Hạch"],[316,"Khảo Hạch Bắt Đầu"],[317,"Khảo Hạch Kết Thúc"],[318,"Bữa Cơm Với Tôn Nghĩa"],[319,"Bao Vây Vương Tiểu Cường"],[320,"Anh Em Họ Vương"],[321,"Bỏ Chạy"],[322,"Hóa Hồng 1"],[323,"Hóa Hồng 2"],[324,"Gặp Lại"],[325,"Vương Tiểu Cường Chết"],[326,"Chuyện Linh Dị Cấp Cao 1"],[327,"Chuyện Linh Dị Cấp Cao 2"],[328,"Tài Xế"],[329,"Vợ, Anh Yêu Em"],[330,"Bảo Vệ"],[331,"Hòa Giải Tạm Thời"],[332,"Vũ Khí"],[333,"Trương Lệ Cầm Tới"],[334,"Tôi Có Thai Rồi"],[335,"Thai Quỷ"],[336,"Cứu Người"],[337,"Thử Nghiệm"],[338,"Rủi Ro"],[339,"Bắt Được Quỷ Anh"],[340,"Khủng Bố Lan Tràn"],[341,"Hắc Nhật"],[342,"Trương Quý Hiển Tới Nhà"],[343,"Xúc Phạm"],[344,"Đoàn Diệt"],[345,"Bắn Súng"],[346,"Đương Nhiên Là Tôi Thắng"],[347,"Hà Xu hức với nó, nên những chỗ khủng bố của nó chưa hiển lộ ra. Đây cũng là một trong những nguyên nhân chính khiến cho rất nhiều ngự quỷ nhân không dám tham dự vào chuyện linh dị. Số lượng nhân tố không xác định có quá nhiều. Có đôi khi nhìn qua thì thấy chuyện linh dị này cực kỳ dễ để đối phó, nhưng thực tế nó lại là một tồn tại ở cấp độ khó giải. - Tổng giám đốc Dương, ăn điểm tâm thôi."],[1301,"Đồ Vật Linh Dị Của Trừ Linh Xã"],[1302,"Đồ Sứ"],[1303,"Vật Phẩm Môi Giới"],[1304,"Chuyện Linh Dị Thăng Cấp"],[1305,"Dừng Lại Tại Đây"],[1306,"Mời Về"],[1307,"Trương Vĩ Gặp Chuyện"],[1308,"Tôn Nhân"],[1309,"Cho Tôi Một Con Quỷ"],[1310,"Cỗ Thi Thể Bên Giường Ngủ"],[1311,"Tiệc Rượu"],[1312,"Là Quách Đào"],[1313,"Vương Tín Lại Tới"],[1314,"Điều Kiện"],[1315,"Đồng Ý"],[1316,"Đi Tới Đỉnh Cao Của Nhân Sinh"],[1317,"Tới Kobe"],[1318,"Cô Gái Tên Keiko"],[1319,"Ba Món Đồ Sứ"],[1320,"Cầu Xin Ngài Cứu Tôi"],[1321,"Điền Dã 1"],[1322,"Điền Dã 2"],[1323,"Tập Hợp"],[1324,"Tiến Vào Thành Phố"],[1325,"Cảm Ứng Chuyện Linh Dị"],[1326,"Ngôi Nhà Kỳ Lạ"],[1327,"Phái Quỷ Đồng Điều Tra"],[1328,"Chuyến Đi Này Thật Xui Xẻo"],[1329,"Căn Phòng Kỳ Lạ"],[1330,"Quỷ Đồng Bên Trong Cái Tủ"],[1331,"Cỗ Thi Thể Bên Trong Tủ"],[1332,"Quần Áo Quỷ Dị"],[1333,"Rời Khỏi Căn Nhà Kỳ Quái"],[1334,"Thành Phố Kobe Kỳ Lạ"],[1335,"Cuộc Gọi Chết Chóc"],[1336,"Sakai Tử"],[1337,"Dụ Quỷ Gõ Cửa Xuất Hiện"],[1338,"Tiếng Gõ Cửa"],[1339,"Bách Quỷ Dạ Hành"],[1340,"Đầu Người Thay Thế"],[1341,"Khống Chế Quỷ Gõ Cửa"],[1342,"Năm Mét"],[1343,"Mãnh Quỷ Xoay Đầu"],[1344,"Quyết Định Cấp Bách"],[1345,"Món Đồ Sứ Vỡ Vụn"],[1346,"Bản Năng Của Lệ Quỷ"],[1347,"Tôi Biết Nói Tiếng Trung"],[1348,"Nhà Nghỉ"],[1349,"Sự Lựa Chọn Của Keiko"],[1350,"Tọa Độ Lạ"],[1351,"Bộ Trưởng Ichirou"],[1352,"Cãi Nhau"],[1353,"Dẫn Dụ Lệ Quỷ"],[1354,"Thư Giãn"],[1355,"Chôn Dưới Đất"],[1356,"Ăn Mòn Kịch Liệt"],[1357,"Sắp Tới"],[1358,"Sợ Hãi Tột Cùng"],[1359,"Kéo Chân Lệ Quỷ"],[1360,"Đóng Nắp Rương"],[1361,"Không Thể Tưởng Tượng Được"],[1362,"Đầu Trọc Yamazaki"],[1363,"Cân ủa hai người chỉ trên mức tình bạn dưới tình yêu, chỉ còn thiếu một bước nữa thôi. Giờ cậu không xác định mối quan hệ của hai người, chắc có lẽ lần sau gặp người ta có con luôn rồi.” “Lúc đó cậu là người thiệt thòi nhất còn gì? May đối phương là bạn trai cậu đó, chứ không đêm nay tớ gõ cửa phòng người ta rồi.” “Đâu đến mức khoa trương như cậu nói.” Miêu Tiểu Thiện nói. Tôn Vũ Giai lại nói: “Không hề, Lưu Tử có thể làm được như thế đó.\" Cô hiểu tính Lưu Tử, cô ấy nói được làm được. Với lại họ đã bị dọa mất hồn mất vía, trong trường hợp gặp phải sự kiện linh dị liên quan đến mạng sống, có một người bạn trai như này sẽ cả thấy yên tâm và an toàn hơn. “Tớ thấy các cậu ai cũng có ý với Dương Gian.” Miêu Tiểu Thiện phụng phịu nói. Lưu Tử nói: “Bọn tớ lo lắng cho cậu thôi, nhanh còn chậm mất, cậu không biết à? Đối thủ của cậu cũng không phải là bọn tớ mà là các chị gái xinh đẹp đáng yêu trong xã hội kia kìa. Nếu cậu cứ tiếp tục do dự như vậy, cơ hội của cậu càng ngày càng nhỏ đi, sau này hai người còn ít gặp nhau nữa chứ, không thường xuyên như ngày tháng đi học lúc trước đâu.” Miêu Tiểu Thiện nghe thế thì thấy hoảng thật. Cô lại nhớ đến cuộc nói chuyện với Trương Vĩ, hôm nay Dương Gian đi hẹn hò. Hẹn hò với ai, cô gái hẹn hò trông thế nào, cô không hề biết. Cô biết cứ tiếp tục như vậy, khoảng cách giữa cô và Dương Gian càng ngày càng xa, thậm chí cũng khó gặp được anh nếu không có lý do đặc biệt."],[2401,"Ngỏ Lời"],[2402,"Dương Tử Phong"],[2403,"Sai Lầm"],[2404,"Tờ Giấy Ước Nguyện"],[2405,"Thực Quỷ Nhân Trương Lôi"],[2406,"Vào Vấn Đề"],[2407,"Làm Công Ăn Lương"],[2408,"Bé Gái"],[2409,"Sàng Lọc"],[2410,"Tìm Thấy"],[2411,"Triệu Khai Minh?"],[2412,"Chạm Trán"],[2413,"Triệu Tiểu Nhã"],[2414,"Lưu Tư Duyệt"],[2415,"Xử Lý Gọn Gàng"],[2416,"Cô Ấy Mà Chết Thì Anh Chết Theo"],[2417,"Lão Tần Xảy Ra Chuyện"],[2418,"Phương Pháp Nào Tốt Hơn?"],[2419,"Cấp SS?"],[2420,"Liên Thủ"],[2421,"Danh Sách Đội Trưởng Tham Gia"],[2422,"Thống Nhất"],[2423,"Tớ Thích Làm Lao Công"],[2424,"Lại Đến Bưu ương Lan bên ngoài không phải là Hương Lan thật mà là một người được tạo ra bằng sức mạnh linh dị. Chỉ có như vậy, chúng ta mới giải thích được tại sao Hương Lan sau khi chết luôn hồi sinh ở đây.\" \"Vậy chìa khóa cho sự hồi sinh ở phòng 101 chính là bia mộ trong căn phòng này? Bởi vì bia mộ được đặt trong căn phòng và đè lên cơ thể cô ấy nên cô ta mới không có cách nào thoát khỏi sự trói buộc của căn phòng\". \"Muốn phá bỏ lời nguyền hồi sinh không ngừng chỉ cần dỡ bỏ bia mộ để xác Hương Lan thật không còn bị đè lên.\" \"Vậy là mọi thứ ở đây đều do ai đó cố tình sắp đặt.\" Sau khi nhìn thấy sự thật, nghi ngờ của Dương Gian lập tức được giải quyết. Hắn nhanh chóng tỉnh lại và ngừng thao túng Hương Lan, để cô ta trở lại bình thường."],[2701,"Tìm Kiếm Phòng 100"],[2702,"Xương Người"],[2703,"Khởi Động Lại"],[2704,"Một Khúc Xương, Một Cây Quỷ Nến"],[2705,"Phòng 100"],[2706,"Manh Mối"],[2707,"Ngôn Xuất Pháp Tùy"],[2708,"Quay Đầu"],[2709,"Quỷ Vẫn Đi Theo"],[2710,"Bếp Lửa Kỳ Quái"],[2711,"Lạc Đường"],[2712,"Đừng Vào Phòng"],[2713,"Nguy Hiểm Cận Kề"],[2714,"Biến Mất"],[2715,"Thật Thật Giả Giả"],[2716,"Là Quỷ"],[2017,"Đốt"],[2718,"Cơ Hội Vương Căn Toàn nói: “Bây giờ A Nam đã chết, Chu Kiến đã chết."],[2719,"Hậu Thủ"],[2720,"Bất Đắc Dĩ"],[2721,"Thang Máy Muốn Đi"],[2722,"Tụ Họp"],[2723,"Thủ Đoạn Của Đám Người Bình Thường"],[2724,"Lệ Quỷ"],[2725,"Ra Tay"],[2726,"Biển Thi"],[2727,"Thi Thể Đáng Sợ"],[2728,"Cửa Sinh Duy Nhất"],[2729,"Hội Tụ"],[2730,"Mạo Hiểm"],[2731,"Bị Quỷ Bóp Cổ"],[2732,"Hi Vọng"],[2733,"Lựa Chọn"],[2734,"Chọn Sai? ??"],[2735,"Chết! !!"],[2736,"Nghĩ Quá Đơn Giản"],[2737,"Nguyên Tắc"],[2738,"Câu Hồn"],[2739,"Không Phải Lệ Quỷ Không Mạnh"],[2740,"Lưu Lại Thông Tin"],[2771,"Bạn Cũ"],[2742,"Phóng Hoả"],[2743,"Hồi Quang Phản Chiếu"],[2744,"Cửa"],[2745,"Mở Cửa"],[2746,"Lệ Quỷ Giúp Đỡ? ??"],[2747,"Thành Công"],[2748,"Ý Thức Nằm Ở Đâu"],[2749,"Trị Liệu"],[2750,"Trở Lại Sáng hôm sau."],[2751,"Cháy Đen"],[2752,"Vương Căn Toàn"],[2753,"Cách Để Ra Ngoài"],[2754,"Đồng Thiên <script>
(function(){
const TOC = JSON.parse(document.getElementById('tocdata').textContent);
const N = TOC.length;
const PER = 50;
const CACHE = new Map();          // shard index -> array of chapters
async function loadShard(s){
  if(CACHE.has(s)) return CACHE.get(s);
  const r = await fetch('data/vol-'+String(s).padStart(3,'0')+'.json');
  const arr = await r.json();
  CACHE.set(s, arr);
  if(CACHE.size > 8){ const k = CACHE.keys().next().value; if(k!==s) CACHE.delete(k); }
  return arr;
}
async function getChap(i){
  const s = Math.floor(i/PER);
  const arr = await loadShard(s);
  // prefetch next shard in background
  const nx = Math.floor((i+1)/PER);
  if(nx!==s && nx*PER < N) loadShard(nx).catch(()=>{});
  return arr[i - s*PER];
}
const $ = id => document.getElementById(id);
const LSKEY = 'kbsl_reader';

// ---------- state ----------
let st = {theme:'dark', fs:19, lh:1.85, font:'serif', w:700, ch:0, scroll:0};
try{ Object.assign(st, JSON.parse(localStorage.getItem(LSKEY)||'{}')); }catch(e){}
function save(){ try{ localStorage.setItem(LSKEY, JSON.stringify(st)); }catch(e){} }
let saveTimer=null;
function saveSoon(){ clearTimeout(saveTimer); saveTimer=setTimeout(save,400); }

// ---------- apply settings ----------
function applySettings(){
  document.body.dataset.theme = st.theme;
  document.body.dataset.font = st.font;
  document.documentElement.style.setProperty('--fs', st.fs+'px');
  document.documentElement.style.setProperty('--lh', st.lh);
  document.documentElement.style.setProperty('--maxw', st.w+'px');
  $('fsVal').textContent = st.fs+'px';
  $('lhVal').textContent = st.lh.toFixed(2).replace(/0$/,'');
  document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('on', s.dataset.theme===st.theme));
  $('fSerif').classList.toggle('on', st.font==='serif');
  $('fSans').classList.toggle('on', st.font==='sans');
  document.querySelectorAll('.wbtn').forEach(b=>b.classList.toggle('on', +b.dataset.w===st.w));
}

// ---------- TOC ----------
const toclist = $('toclist');
function buildToc(filter){
  const frag = document.createDocumentFragment();
  const f = (filter||'').toLowerCase().trim();
  for(let i=0;i<N;i++){
    const [num,title] = TOC[i];
    if(f && !(String(num).includes(f) || title.toLowerCase().includes(f))) continue;
    const b = document.createElement('button');
    b.className = 'tocitem' + (i===st.ch?' current':'');
    b.dataset.i = i;
    b.innerHTML = '<span class="num">Chương '+num+'</span>'+escapeHtml(title||'(không tên)');
    frag.appendChild(b);
  }
  toclist.innerHTML='';
  toclist.appendChild(frag);
}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
toclist.addEventListener('click', e=>{
  const b = e.target.closest('.tocitem'); if(!b) return;
  gotoChapter(+b.dataset.i, true);
  closeSidebar();
});
let searchTimer=null;
$('chapsearch').addEventListener('input', e=>{
  clearTimeout(searchTimer);
  searchTimer = setTimeout(()=>buildToc(e.target.value), 200);
});

// ---------- render chapter ----------
async function gotoChapter(i, resetScroll){
  st.ch = Math.max(0, Math.min(N-1, i));
  $('content').innerHTML = '<p style="color:var(--muted)">Đang tải chương...</p>';
  let ch;
  try{ ch = await getChap(st.ch); }
  catch(e){ $('content').innerHTML = '<p style="color:var(--accent)">Không tải được chương — kiểm tra kết nối mạng rồi thử lại.</p>'; return; }
  const [num,title,paras] = ch;
  $('chKicker').textContent = 'Chương '+num+' / '+TOC[N-1][0];
  $('chTitle').textContent = title || '(không tên)';
  $('barTitle').textContent = 'Ch.'+num+' · '+(title||'');
  document.title = 'Ch.'+num+' — Khủng Bố Sống Lại';
  const html = paras.map(p=>'<p>'+escapeHtml(p)+'</p>').join('');
  $('content').innerHTML = html;
  $('btnPrev').disabled = st.ch===0;
  $('btnNext').disabled = st.ch===N-1;
  // update TOC highlight
  toclist.querySelectorAll('.tocitem.current').forEach(x=>x.classList.remove('current'));
  const cur = toclist.querySelector('.tocitem[data-i="'+st.ch+'"]');
  if(cur){ cur.classList.add('current'); }
  if(resetScroll!==false){ window.scrollTo(0, resetScroll===true?0:(st.scroll||0)); }
  save();
}
$('btnPrev').onclick = ()=>{ st.scroll=0; gotoChapter(st.ch-1, true); };
$('btnNext').onclick = ()=>{ st.scroll=0; gotoChapter(st.ch+1, true); };
document.addEventListener('keydown', e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.key==='ArrowLeft') $('btnPrev').click();
  if(e.key==='ArrowRight') $('btnNext').click();
});

// ---------- sidebar / settings toggles ----------
const sidebar=$('sidebar'), overlay=$('overlay'), settings=$('settings');
function openSidebar(){
  sidebar.classList.add('show'); overlay.classList.add('show'); settings.classList.remove('show');
  const cur = toclist.querySelector('.tocitem.current');
  if(cur) cur.scrollIntoView({block:'center'});
}
function closeSidebar(){ sidebar.classList.remove('show'); overlay.classList.remove('show'); }
$('btnToc').onclick = ()=> sidebar.classList.contains('show') ? closeSidebar() : openSidebar();
overlay.onclick = closeSidebar;
$('btnSet').onclick = ()=>{ settings.classList.toggle('show'); };
document.addEventListener('click', e=>{
  if(settings.classList.contains('show') && !settings.contains(e.target) && e.target.id!=='btnSet'){
    settings.classList.remove('show');
  }
});

// ---------- settings events ----------
document.querySelectorAll('.swatch').forEach(s=> s.onclick = ()=>{ st.theme=s.dataset.theme; applySettings(); save(); });
$('fsUp').onclick = ()=>{ st.fs=Math.min(30,st.fs+1); applySettings(); save(); };
$('fsDown').onclick = ()=>{ st.fs=Math.max(14,st.fs-1); applySettings(); save(); };
$('lhUp').onclick = ()=>{ st.lh=Math.min(2.4,+(st.lh+0.05).toFixed(2)); applySettings(); save(); };
$('lhDown').onclick = ()=>{ st.lh=Math.max(1.4,+(st.lh-0.05).toFixed(2)); applySettings(); save(); };
$('fSerif').onclick = ()=>{ st.font='serif'; applySettings(); save(); };
$('fSans').onclick = ()=>{ st.font='sans'; applySettings(); save(); };
document.querySelectorAll('.wbtn').forEach(b=> b.onclick = ()=>{ st.w=+b.dataset.w; applySettings(); save(); });

// ---------- scroll: progress bar, hide topbar, save position ----------
let lastY=0;
window.addEventListener('scroll', ()=>{
  const y = window.scrollY;
  const h = document.documentElement.scrollHeight - window.innerHeight;
  $('progress').style.width = (h>0 ? (y/h*100) : 0) + '%';
  $('topbar').classList.toggle('hidden', y>120 && y>lastY);
  lastY = y;
  st.scroll = y;
  saveSoon();
}, {passive:true});

// ---------- init ----------
applySettings();
buildToc('');
gotoChapter(st.ch, false);
window.scrollTo(0, st.scroll||0);
})();
</script>
</body>
</html>
